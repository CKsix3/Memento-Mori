<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Memento Mori</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow-x: hidden;
    background: #f5f0e8;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 0 48px;
    font-family: 'EB Garamond', serif;
    min-height: 100vh;
  }
  h1 {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    letter-spacing: 0.2em;
    color: #1a1a1a;
    font-weight: 700;
    text-align: center;
    margin-bottom: 4px;
  }
  .sub {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.35em;
    color: #aaa;
    text-align: center;
    margin-bottom: 16px;
  }
  .calendar {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    width: 100%;
    padding: 0 12px;
  }
  .left-col {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    flex-shrink: 0;
    margin-right: 4px;
  }
  .years-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #999;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 3px;
    padding-top: 20px;
  }
  .year-nums {
    display: flex;
    flex-direction: column;
    padding-top: 20px;
  }
  .yn {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    color: #bbb;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 3px;
    min-width: 20px;
  }
  .right-col {
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .week-header {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    margin-bottom: 2px;
    height: 18px;
    align-items: center;
  }
  .wh {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: #bbb;
  }
  .grid {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .grid-row {
    display: flex;
    flex-direction: row;
    gap: 2px;
  }
  .cell {
    border-radius: 50%;
    border: 1px solid #1a1a1a;
    background: transparent;
    flex-shrink: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .cell.filled { background: #1a1a1a; }
  .quote {
    font-style: italic;
    font-size: 12px;
    color: #777;
    margin-top: 24px;
    text-align: center;
    line-height: 1.7;
    padding: 0 24px;
  }
  .quote cite {
    display: block;
    font-style: normal;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #bbb;
    margin-top: 4px;
  }
</style>
</head>
<body>
<h1>MEMENTO MORI</h1>
<p class="sub">WEEKS</p>
<div class="calendar">
  <div class="left-col">
    <div class="years-label" id="yearsLabel">YEARS</div>
    <div class="year-nums" id="yearNums"></div>
  </div>
  <div class="right-col">
    <div class="week-header">
      <span class="wh">1</span>
      <span class="wh">52</span>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>
<div class="quote">
  "It's not death a man should fear, but he should fear never beginning to live"
  <cite>— MARCUS AURELIUS</cite>
</div>
<script>
  const YEARS = 86, WEEKS = 52;
  const birthday = new Date(1997, 6, 26);
  const weeksLived = Math.floor((new Date() - birthday) / (7*24*60*60*1000));
  const filled = Array.from({length: YEARS}, () => new Array(WEEKS).fill(false));
  let n = 0;
  outer: for (let y = 0; y < YEARS; y++)
    for (let w = 0; w < WEEKS; w++) {
      if (n >= weeksLived) break outer;
      filled[y][w] = true; n++;
    }
  try {
    const saved = JSON.parse(localStorage.getItem('mm2') || 'null');
    if (saved && saved.length === YEARS)
      for (let y = 0; y < YEARS; y++)
        for (let w = 0; w < WEEKS; w++)
          filled[y][w] = saved[y][w];
  } catch(e) {}
  let saveTimer = null;
  function saveState() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      try { localStorage.setItem('mm2', JSON.stringify(filled)); } catch(e) {}
    }, 800);
  }
  function getCellSize() {
    const available = window.innerWidth - 12*2 - 20 - 3 - 10 - 4;
    const size = Math.floor((available - (WEEKS - 1) * 2) / WEEKS);
    return Math.max(4, Math.min(size, 11));
  }
  function build() {
    const CELL = getCellSize();
    const yearNums = document.getElementById('yearNums');
    const grid = document.getElementById('grid');
    const yearsLabel = document.getElementById('yearsLabel');
    yearNums.innerHTML = '';
    grid.innerHTML = '';
    const rowH = CELL + 2;
    yearsLabel.style.height = (YEARS * rowH) + 'px';
    for (let y = 0; y < YEARS; y++) {
      const label = y;
      const show = label === 0 || label % 5 === 0 || label === YEARS - 1;
      const yn = document.createElement('div');
      yn.className = 'yn';
      yn.style.height = rowH + 'px';
      if (show) yn.textContent = label;
      yearNums.appendChild(yn);
      const row = document.createElement('div');
      row.className = 'grid-row';
      for (let w = 0; w < WEEKS; w++) {
        const cell = document.createElement('div');
        cell.className = 'cell' + (filled[y][w] ? ' filled' : '');
        cell.style.width = CELL + 'px';
        cell.style.height = CELL + 'px';
        cell.addEventListener('click', () => {
          filled[y][w] = !filled[y][w];
          cell.classList.toggle('filled', filled[y][w]);
          saveState();
        });
        row.appendChild(cell);
      }
      grid.appendChild(row);
    }
  }
  document.fonts.ready.then(build);
  window.addEventListener('resize', build);
</script>
</body>
</html>
